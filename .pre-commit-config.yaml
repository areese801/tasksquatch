repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.9
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v2.1.0
    hooks:
      - id: mypy
        args: [--strict]
        files: ^src/
        additional_dependencies:
          - typer>=0.12
          - types-python-dateutil
          - sqlalchemy>=2.0
          - uuid-utils>=0.9
          - fastapi>=0.110
          - pydantic>=2.6
          - uvicorn>=0.29
          - textual>=0.60
          - rapidfuzz>=3.6
